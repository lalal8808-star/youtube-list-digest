name: Daily YouTube Newsletter

on:
  schedule:
    # 매일 한국 시간 오전 7시 (UTC 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run script
      env:
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      run: python youtube_newsletter.py

    - name: Commit sent history
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -f sent_history.json
        git commit -m "Update sent_history.json [skip ci]" || echo "No changes to commit"
        git push
